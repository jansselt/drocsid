server {
    listen 3080;
    server_name _;

    # Prevent nginx from including port/scheme in redirects (it listens on 3080
    # but Cloudflare Tunnel proxies HTTPS → HTTP, so nginx's auto-generated
    # redirects would point to http://:3080 which breaks)
    absolute_redirect off;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /opt/drocsid/web;
    index index.html;

    # Frontend — SPA with client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin dashboard SPA (files deployed under web root at /opt/drocsid/web/admin/)
    # ^~ ensures this takes priority over the catch-all location /
    location ^~ /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    # REST API (also supports WebSocket upgrade for admin log streaming)
    location /api/ {
        proxy_pass http://127.0.0.1:9847;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # File uploads can be large
        client_max_body_size 50m;

        # Admin log stream is long-lived
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # WebSocket gateway
    location /gateway {
        proxy_pass http://127.0.0.1:9847;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket connections are long-lived
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Uploaded files (avatars, attachments) served from MinIO
    location /uploads/ {
        proxy_pass http://127.0.0.1:9500/drocsid-uploads/;
        proxy_set_header Host $host;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # LiveKit signaling (WebSocket) — proxied through Cloudflare Tunnel
    # Media (UDP) goes direct to public IP via port forwarding
    location /livekit/ {
        proxy_pass http://127.0.0.1:7880/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
