name: Build Desktop App

on:
  workflow_call:
    inputs:
      tag_name:
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup PATH
        run: |
          for p in "$HOME/.nvm/versions/node"/*/bin; do
            [ -d "$p" ] && echo "$p" >> "$GITHUB_PATH"
          done

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Build Electron app (Linux)
        working-directory: app
        run: npm run electron:build:linux
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          ELECTRON: "1"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          retention-days: 1
          path: |
            app/dist-electron/*.AppImage
            app/dist-electron/*.deb
            app/dist-electron/*.rpm
            app/dist-electron/latest-linux.yml

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        working-directory: app
        run: npm ci

      - name: Build Electron app (Windows)
        working-directory: app
        run: npm run electron:build:win
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
          ELECTRON: "1"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          retention-days: 1
          path: |
            app/dist-electron/*.exe
            app/dist-electron/latest.yml

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-packages
          path: artifacts/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-packages
          path: artifacts/windows

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.rpm' -o -name '*.exe' -o -name '*.yml' -o -name '*.blockmap' \) -exec cp {} release/ \;
          echo "Release files:"
          ls -lh release/

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: release/*
